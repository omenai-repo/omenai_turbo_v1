name: Build Check

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install dependencies
        run: yarn

      - name: Build project
        run: yarn build
        env:
          TURBO_TELEMETRY_DISABLED: 1
          NEXT_TELEMETRY_DISABLED: 1
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_WEBSITE_URL: ${{ secrets.NEXT_PUBLIC_WEBSITE_URL }}
          NEXT_PUBLIC_ATTENDEE_URL: ${{ secrets.NEXT_PUBLIC_ATTENDEE_URL }}
          NEXT_PUBLIC_ORGANISATION_URL: ${{ secrets.NEXT_PUBLIC_ORGANISATION_URL }}
          NEXT_PUBLIC_ADMIN_URL: ${{ secrets.NEXT_PUBLIC_ADMIN_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_MAP_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAP_API_KEY }}
          NEXT_PUBLIC_JWT_SECRET: ${{ secrets.NEXT_PUBLIC_JWT_SECRET }}
          NEXT_PUBLIC_CLOUDFRONT_HOSTNAME: ${{ secrets.NEXT_PUBLIC_CLOUDFRONT_HOSTNAME }}
