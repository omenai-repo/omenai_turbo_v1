name: Build Check

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install dependencies
        run: yarn

      - name: Build project
        run: yarn build
        env:
          TURBO_TELEMETRY_DISABLED: 1
          NEXT_TELEMETRY_DISABLED: 1
          # MongoDB
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_PASSWORD: ${{ secrets.MONGODB_PASSWORD }}
          # Session / Auth
          SECRET_COOKIE_PASSWORD: ${{ secrets.SECRET_COOKIE_PASSWORD }}
          SESSION_KEY: ${{ secrets.SESSION_KEY }}
          SECRET_SALT: ${{ secrets.SECRET_SALT }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          APP_AUTHORIZATION_SECRET: ${{ secrets.APP_AUTHORIZATION_SECRET }}
          # Appwrite
          APPWRITE_BUCKET_ID: ${{ secrets.APPWRITE_BUCKET_ID }}
          APPWRITE_CLIENT_ID: ${{ secrets.APPWRITE_CLIENT_ID }}
          APPWRITE_DOCUMENTATION_BUCKET_ID: ${{ secrets.APPWRITE_DOCUMENTATION_BUCKET_ID }}
          APPWRITE_EDITORIAL_BUCKET_ID: ${{ secrets.APPWRITE_EDITORIAL_BUCKET_ID }}
          APPWRITE_EDITORIAL_COLLECTION_ID: ${{ secrets.APPWRITE_EDITORIAL_COLLECTION_ID }}
          APPWRITE_EDITORIAL_DATABASE_ID: ${{ secrets.APPWRITE_EDITORIAL_DATABASE_ID }}
          APPWRITE_ENDPOINT: ${{ secrets.APPWRITE_ENDPOINT }}
          APPWRITE_INVOICE_BUCKET_ID: ${{ secrets.APPWRITE_INVOICE_BUCKET_ID }}
          APPWRITE_LOGO_BUCKET_ID: ${{ secrets.APPWRITE_LOGO_BUCKET_ID }}
          APPWRITE_PROMOTIONAL_BUCKET_ID: ${{ secrets.APPWRITE_PROMOTIONAL_BUCKET_ID }}
          APPWRITE_UPLOAD_KEY: ${{ secrets.APPWRITE_UPLOAD_KEY }}
          NEXT_PUBLIC_APPWRITE_BUCKET_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_BUCKET_ID }}
          NEXT_PUBLIC_APPWRITE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_CLIENT_ID }}
          NEXT_PUBLIC_APPWRITE_DOCUMENTATION_BUCKET_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_DOCUMENTATION_BUCKET_ID }}
          NEXT_PUBLIC_APPWRITE_EDITORIAL_BUCKET_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_EDITORIAL_BUCKET_ID }}
          NEXT_PUBLIC_APPWRITE_EDITORIAL_COLLECTION_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_EDITORIAL_COLLECTION_ID }}
          NEXT_PUBLIC_APPWRITE_EDITORIAL_DATABASE_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_EDITORIAL_DATABASE_ID }}
          NEXT_PUBLIC_APPWRITE_ENDPOINT: ${{ secrets.NEXT_PUBLIC_APPWRITE_ENDPOINT }}
          NEXT_PUBLIC_APPWRITE_INVOICE_BUCKET_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_INVOICE_BUCKET_ID }}
          NEXT_PUBLIC_APPWRITE_LOGO_BUCKET_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_LOGO_BUCKET_ID }}
          NEXT_PUBLIC_APPWRITE_PROMOTIONAL_BUCKET_ID: ${{ secrets.NEXT_PUBLIC_APPWRITE_PROMOTIONAL_BUCKET_ID }}
          NEXT_PUBLIC_APPWRITE_UPLOAD_KEY: ${{ secrets.NEXT_PUBLIC_APPWRITE_UPLOAD_KEY }}
          # Email
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          # Flutterwave
          FLW_TEST_PUBLIC_KEY: ${{ secrets.FLW_TEST_PUBLIC_KEY }}
          FLW_TEST_SECRET_KEY: ${{ secrets.FLW_TEST_SECRET_KEY }}
          FLW_TEST_ENCRYPTION_KEY: ${{ secrets.FLW_TEST_ENCRYPTION_KEY }}
          FLW_PAYMENT_PLAN_ID: ${{ secrets.FLW_PAYMENT_PLAN_ID }}
          FLW_SECRET_HASH: ${{ secrets.FLW_SECRET_HASH }}
          # Stripe
          STRIPE_SK: ${{ secrets.STRIPE_SK }}
          NEXT_PUBLIC_STRIPE_PK: ${{ secrets.NEXT_PUBLIC_STRIPE_PK }}
          STRIPE_PAYMENT_INTENT_WEBHOOK_SECRET: ${{ secrets.STRIPE_PAYMENT_INTENT_WEBHOOK_SECRET }}
          STRIPE_CHECKOUT_SESSION_WEBHOOK_SECRET: ${{ secrets.STRIPE_CHECKOUT_SESSION_WEBHOOK_SECRET }}
          # Exchange Rate
          EXCHANGE_RATE_API_KEY: ${{ secrets.EXCHANGE_RATE_API_KEY }}
          # Omenai Plan IDs
          NEXT_PUBLIC_BASIC_PLAN: ${{ secrets.NEXT_PUBLIC_BASIC_PLAN }}
          NEXT_PUBLIC_PRO_PLAN: ${{ secrets.NEXT_PUBLIC_PRO_PLAN }}
          NEXT_PUBLIC_PREMIUM_PLAN: ${{ secrets.NEXT_PUBLIC_PREMIUM_PLAN }}
          # TinyMCE
          NEXT_PUBLIC_TINYMCE_API_KEY: ${{ secrets.NEXT_PUBLIC_TINYMCE_API_KEY }}
          # Firebase
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          # DHL
          DHL_API_KEY: ${{ secrets.DHL_API_KEY }}
          DHL_API_SECRET: ${{ secrets.DHL_API_SECRET }}
          # TaxJar
          TAXJAR_API_KEY: ${{ secrets.TAXJAR_API_KEY }}
          # Upstash / QStash
          QSTASH_URL: ${{ secrets.QSTASH_URL }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          # Calendarific
          CALENDARIFIC_API_KEY: ${{ secrets.CALENDARIFIC_API_KEY }}
          # Google Maps
          MAPS_APIKEY: ${{ secrets.MAPS_APIKEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          # Sentry
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # Cloudinary
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          # Misc
          ROBOT: ${{ secrets.ROBOT }}
          ANONYMIZE_SECRET: ${{ secrets.ANONYMIZE_SECRET }}
          # Rollbar
          NEXT_PUBLIC_ROLLBAR_CLIENT_TOKEN: ${{ secrets.NEXT_PUBLIC_ROLLBAR_CLIENT_TOKEN }}
          ROLLBAR_SERVER_TOKEN: ${{ secrets.ROLLBAR_SERVER_TOKEN }}
          # ConfigCat
          NEXT_PUBLIC_CONFIGCAT_STAGING_HIGH_RISK_SDK_KEY: ${{ secrets.NEXT_PUBLIC_CONFIGCAT_STAGING_HIGH_RISK_SDK_KEY }}
          NEXT_PUBLIC_CONFIGCAT_STAGING_LOW_RISK_SDK_KEY: ${{ secrets.NEXT_PUBLIC_CONFIGCAT_STAGING_LOW_RISK_SDK_KEY }}
          CONFIGCAT_BASIC_AUTH_USERNAME: ${{ secrets.CONFIGCAT_BASIC_AUTH_USERNAME }}
          CONFIGCAT_BASIC_AUTH_PASSWORD: ${{ secrets.CONFIGCAT_BASIC_AUTH_PASSWORD }}
          CONFIGCAT_BASIC_AUTHORIZATION_HEADER: ${{ secrets.CONFIGCAT_BASIC_AUTHORIZATION_HEADER }}
          NEXT_PUBLIC_CONFIGCAT_LOW_RISK_SDK_KEY: ${{ secrets.NEXT_PUBLIC_CONFIGCAT_LOW_RISK_SDK_KEY }}
          NEXT_PUBLIC_CONFIGCAT_HIGH_RISK_SDK_KEY: ${{ secrets.NEXT_PUBLIC_CONFIGCAT_HIGH_RISK_SDK_KEY }}
          # Google Generative AI
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          # PostHog
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          # Hashing / Security
          EMAIL_HASH_KEYS: ${{ secrets.EMAIL_HASH_KEYS }}
          EMAIL_HASH_ACTIVE_KID: ${{ secrets.EMAIL_HASH_ACTIVE_KID }}
          DATA_DELETION_LOG_SIGNING_KEY: ${{ secrets.DATA_DELETION_LOG_SIGNING_KEY }}
          # Cron
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # URLs
          NEXT_PUBLIC_URL_API_DEVELOPMENT: ${{ secrets.NEXT_PUBLIC_URL_API_DEVELOPMENT }}
          # Expo
          EXPO_NOTIFICATION_ENDPOINT: ${{ secrets.EXPO_NOTIFICATION_ENDPOINT }}
